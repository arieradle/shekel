name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.check.outputs.docs-only }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: compare with merge base
            BASE=$(git merge-base origin/${{ github.base_ref }} HEAD)
            CHANGED=$(git diff --name-only $BASE HEAD)
          else
            # Push: compare with previous commit
            if [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git diff --name-only ${{ github.event.before }} HEAD)
            else
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            fi
          fi

          # Check if any non-markdown files changed
          NON_MD=$(echo "$CHANGED" | grep -v '\.md$' | grep -v '^docs/' | grep -v 'mkdocs.yml' | wc -l)

          if [ "$NON_MD" -eq 0 ] && [ ! -z "$CHANGED" ]; then
            echo "docs-only=true" >> $GITHUB_OUTPUT
          else
            echo "docs-only=false" >> $GITHUB_OUTPUT
          fi

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[all,docs]"

      - name: Check mkdocs integrity
        run: mkdocs build --strict --no-directory-urls
        continue-on-error: false

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Format check (black)
        run: black --check .

      - name: Import sort check (isort)
        run: isort --check-only .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy shekel/

      - name: Test (pytest)
        run: pytest tests/ -v --cov=shekel --cov-report=xml --ignore=tests/integrations --ignore=tests/performance

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  integration-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Integration Tests (pytest)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HUGGING_FACE_API: ${{ secrets.HUGGING_FACE_API }}
        run: pytest tests/integrations/ -v --cov=shekel --cov-report=xml --cov-append

      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: integration
          fail_ci_if_error: false

  performance:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs-only == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Performance Tests (pytest-benchmark)
        run: |
          mkdir -p .benchmarks
          pytest tests/performance/ -v -n 0 \
            --benchmark-only \
            --benchmark-json=.benchmarks/results.json \
            --benchmark-autosave \
            2>&1 | tee performance-report.txt
        continue-on-error: true

      - name: Store performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            .benchmarks/results.json
            performance-report.txt
          retention-days: 30
