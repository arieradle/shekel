name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Format check (black)
        run: black --check .

      - name: Import sort check (isort)
        run: isort --check-only .

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy shekel/

      - name: Test (pytest)
        run: pytest tests/ -v --cov=shekel --cov-report=xml --ignore=tests/integrations --ignore=tests/performance

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Integration Tests (pytest)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: pytest tests/integrations/ -v --cov=shekel --cov-report=xml --cov-append

      - name: Upload integration coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[all,dev]"

      - name: Performance Tests (pytest-benchmark)
        run: |
          mkdir -p .benchmarks
          pytest tests/performance/ -v \
            --benchmark-only \
            --benchmark-json=.benchmarks/results.json \
            --benchmark-compare=0 \
            --benchmark-compare-fail=min:5% \
            2>&1 | tee performance-report.txt
        continue-on-error: true

      - name: Store performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results
          path: |
            .benchmarks/results.json
            performance-report.txt
          retention-days: 30
